name: opencode-execute

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string
      author:
        description: 'GitHub username of the issue author/commenter who triggered this'
        required: true
        type: string

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build prompt
        id: prompt
        shell: bash
        run: |
          ISSUE_NUM="${{ inputs.issue_number }}"
          AUTHOR="${{ inputs.author }}"
          TIMESTAMP="$(date -u +%Y%m%d-%H%M%S)"
          BRANCH="opencode/issue-${ISSUE_NUM}-${TIMESTAMP}"

          PROMPT="Follow the rules in AGENTS.md. Analyze and implement the requested changes from issue #${ISSUE_NUM}."
          PROMPT="${PROMPT} Read the full issue with: gh issue view ${ISSUE_NUM} --json body,title,comments"
          PROMPT="${PROMPT} Create a branch named '${BRANCH}', make your changes, commit, and push."
          PROMPT="${PROMPT} Do NOT create a pull request — the workflow will create the PR automatically."
          PROMPT="${PROMPT} Keep the commit message concise: describe only the key changes, no checklist or meta-instructions."
          PROMPT="${PROMPT} When committing, include the issue author as co-author: Co-authored-by: ${AUTHOR} <${AUTHOR}@users.noreply.github.com>."

          echo "prompt<<PROMPT_EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "PROMPT_EOF" >> "$GITHUB_OUTPUT"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Post working-on comment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" \
            --body "Starting to work on this — I'll open a PR shortly."

      - name: Install opencode
        shell: bash
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add opencode to PATH
        shell: bash
        run: echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Run opencode
        id: opencode
        shell: bash
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          MODEL: opencode-go/deepseek-v4-pro
          PROMPT: ${{ steps.prompt.outputs.prompt }}
        run: opencode github run

      - name: Create pull request
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.prompt.outputs.branch }}"
          ISSUE_NUM="${{ inputs.issue_number }}"
          ISSUE_TITLE="$(gh issue view "${ISSUE_NUM}" --json title -q .title)"

          # Wait a moment for the push to propagate
          sleep 5

          if gh api "repos/${{ github.repository }}/branches/${BRANCH}" --jq .name > /dev/null 2>&1; then
            echo "Branch ${BRANCH} found, creating PR..."
            gh pr create \
              --head "${BRANCH}" \
              --base main \
              --title "${ISSUE_TITLE}" \
              --body "$(printf 'Closes #%s.\n\nAuto-generated by opencode from issue #%s.' "${ISSUE_NUM}" "${ISSUE_NUM}")" \
              || echo "::warning::Failed to create PR (may already exist or opencode didn't push)"
          else
            echo "::warning::Branch ${BRANCH} not found — opencode may not have pushed successfully"
          fi
